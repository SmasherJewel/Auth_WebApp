spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: auth-app-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: false
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile
              - openid
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user

server:
  port: ${SERVER_PORT:8082}
  forward-headers-strategy: framework

security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:auth-app}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:1209600}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Lax}
    cookie-domain: ${JWT_COOKIE_DOMAIN:}

app:
  cors:
    front-end-url: ${FRONT_END_URL}
  auth:
    frontend:
      success-redirect: ${FRONT_END_SUCCESS_REDIRECT}
      failure-redirect: ${FRONT_END_FAILURE_REDIRECT}

logging:
  level:
    root: INFO
    com.substring.auth.app: INFO
